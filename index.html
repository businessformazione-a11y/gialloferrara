<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gianmarco Scaglioso — Work in Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --nero: #0a0a0a;
    --bianco: #f5f2ee;
    --rosso: #c8102e;
    --grigio: #1a1a1a;
    --testo-soft: #9a9a9a;
    --font-titolo: 'Bebas Neue', sans-serif;
    --font-serif: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--nero);
    color: var(--bianco);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .container {
    max-width: 800px;
    text-align: center;
    padding: 2rem;
    position: relative;
    z-index: 2;
  }

  .logo {
    font-family: var(--font-titolo);
    font-size: clamp(1.5rem, 5vw, 2.5rem);
    letter-spacing: 0.12em;
    margin-bottom: 4rem;
  }

  .logo span {
    color: var(--rosso);
  }

  .content {
    margin-bottom: 3rem;
  }

  h1 {
    font-family: var(--font-titolo);
    font-size: clamp(2.5rem, 8vw, 5rem);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--bianco);
    margin-bottom: 1.5rem;
  }

  h1 .accent {
    color: var(--rosso);
  }

  .subtitle {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: var(--testo-soft);
    margin-bottom: 2rem;
    line-height: 1.6;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .description {
    font-size: 1rem;
    line-height: 1.9;
    color: rgba(245, 242, 238, 0.75);
    margin-bottom: 2rem;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  .progress-indicator {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: var(--testo-soft);
  }

  .progress-bar {
    width: 200px;
    height: 2px;
    background: rgba(200, 16, 46, 0.2);
    margin: 1rem auto;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--rosso);
    animation: progress 3s ease-in-out infinite;
  }

  @keyframes progress {
    0% { width: 20%; }
    50% { width: 80%; }
    100% { width: 20%; }
  }

  .contact-section {
    margin-top: 3rem;
    padding-top: 3rem;
    border-top: 1px solid rgba(200, 16, 46, 0.2);
  }

  .contact-label {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--rosso);
    font-weight: 500;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
  }

  .contact-label::before {
    content: '';
    display: block;
    width: 1.5rem;
    height: 1px;
    background: var(--rosso);
  }

  .contact-label::after {
    content: '';
    display: block;
    width: 1.5rem;
    height: 1px;
    background: var(--rosso);
  }

  .email-link {
    font-size: 1.1rem;
    color: var(--rosso);
    text-decoration: none;
    transition: opacity 0.3s;
  }

  .email-link:hover {
    opacity: 0.8;
  }

  @media (max-width: 768px) {
    .container {
      padding: 1.5rem;
    }

    h1 {
      margin-bottom: 1rem;
    }

    .logo {
      margin-bottom: 2rem;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">GIANMARCO SCAGLIOSO<span>.</span></div>

  <div class="content">
    <h1>WORK IN<br><span class="accent">PROGRESS</span></h1>
    <p class="subtitle">Il sito è in costruzione. Torna presto per scoprire le novità!</p>
    <p class="description">Sto preparando qualcosa di speciale. Nel frattempo, rimani aggiornato e seguimi sui miei canali.</p>

    <div class="progress-indicator">
      <p>Sviluppo in corso...</p>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="contact-section">
    <p class="contact-label">Contatti</p>
    <p style="font-size: 1rem; color: rgba(245, 242, 238, 0.85); margin-bottom: 0.5rem;">Per domande o collaborazioni:</p>
    <a href="mailto:info@gianmarcoscaglioso.com" class="email-link">info@gianmarcoscaglioso.com</a>
  </div>
</div>

</body>
</html>
